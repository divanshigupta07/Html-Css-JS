<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    table {
        border-spacing: 5px;
    }
    th, td {
         /* border:3px solid rgb(17, 16, 16); */
         border-collapse: collapse;
         border-radius: 5px;
         border-style: inset;
    }
    th, td {
     /* background-color: #96D4D4; */
     padding: 15px;
    }  
    th {
        text-align: center;
    }
    tr:nth-child(even) {
     background-color: #e8bdda;
    }
    td:nth-child(even), th:nth-child(even) {
     background-color: #D6EEEE;
    }
    tr:hover {background-color: #1b8888;}
    </style>
</head>
<body>
    <h1> Tables </h1>
    <table style="width:50%">
        <caption>Table of Companies</caption>
    <tr>
        <!-- <td>&nbsp;</td> -->
        <th width="60%">Company</th>
        <th>Contact</th>
        <th>Country</th>
    </tr>
    <tr height="40px"> >
        <td>Alfreds Futterkiste</td>
        <td>Maria Anders</td>
        <td>Germany</td>
    </tr>
    <tr>
        <td>Centro comercial Moctezuma</td>
        <td>Francisco Chang</td>
        <td>Mexico</td>
    </tr>
    </table>
    <!-- <caption>Table of Companies</caption> -->
    <hr>
    <table style="width: 50%;">
    <tr>
        <th>Firstname</th>
        <td>Jill</td>
        <td>Eve</td>
    </tr>
    <tr>
        <th>Lastname</th>
        <td>Smith</td>
        <td>Jackson</td>
    </tr>
    <tr>
        <th>Age</th>
        <td>94</td>
        <td>50</td>
    </tr>
    </table>
    <hr>
    <hr>
    <caption>Employee Information</caption>
    <table style="width:40%">
    <tr>
        <th colspan="2" width="60%">Name</th>
        <th>Age</th>
    </tr>
    <tr>
        <td>Jill</td>
        <td>Smith</td>
        <td>50</td>
    </tr>
    <tr>
        <td>Eve</td>
        <td>Jackson</td>
        <td>94</td>
    </tr>
    </table>
    <hr><hr>
    <table style="width:40%">
    <tr>
        <th>Name</th>
        <td>Jill</td>
    </tr>
    <tr>
        <th rowspan="2">Phone</th>
        <td>555-1234</td>
    </tr>
    <tr>
        <td>555-8745</td>
    </tr>
    </table>


</body>
</html>
