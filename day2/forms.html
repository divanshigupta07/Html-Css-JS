<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Forms</h1>
    <form autocomplete="on">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>
        <label for="pwd">Password:</label><br>
        <input type="password" id="pwd" name="pwd" maxlength="4"><br><br>
        <input type="submit" value="Submit">
         
    </form>
    <hr>
    <p>Choose your favorite programming language:</p>
    <form >
        <input type="radio" id="html" name="fav_language" value="HTML">
        <label for="html">HTML</label><br>
        <input type="radio" id="css" name="fav_language" value="CSS">
        <label for="css">CSS</label><br>
        <input type="radio" id="javascript" name="fav_language" value="JavaScript">
        <label for="javascript">JavaScript</label>
    </form>
    <hr>
    <label for="cars">Choose a car:</label>
    <select id="cars" name="cars" size="2" multiple>
        <option value="volvo">Volvo</option>
        <option value="saab" >Saab</option>
        <option value="fiat">Fiat</option>
        <option value="audi" selected>Audi</option>
    </select>

    <hr>
    <textarea name="message" rows="5" cols="20">The cat was playing in the garden.</textarea>
    <br>
    <button type="button" onclick="alert('Hello World!')">Click Me!</button>
    <hr>
    <form action="/action_page.php">
        <fieldset>
            <legend>Personalia:</legend>
            <!-- <p>Personalia</p> -->
            <label for="fname">First name:</label><br>
            <input type="text" id="fname" name="fname" value="First Name"><br>
            <label for="lname">Last name:</label><br>
            <input type="text" id="lname" name="lname" value="Last Name"><br><br>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </fieldset>
    </form>

    <hr>
    <form action="/action_page.php">
        <input list="browsers">
        <datalist id="browsers">
            <option value="Edge">
            <option value="Firefox">
            <option value="Chrome">
            <option value="Opera">
            <option value="Safari">
        </datalist>
    </form>
    <hr>
    <form action="/action_page.php" oninput="x.value=parseInt(a.value)+parseInt(b.value)+parseInt(c.value)">
    
    <input type="range"  id="a" name="a" value="50">
     +
    <input type="number" id="b" name="b" value="50">
     +
    <input type="number" id="c" name="c" value="50">
    =
    <output name="x" for="a c b"></output>
    <br><br>
    <input type="submit">
    </form>

    <hr>
    <form>
    <label for="birthdaytime">Birthday (date and time):</label>
    <input type="datetime-local" id="birthdaytime" name="birthdaytime"><br>
    <label for="myfile">Select a file:</label>
    <input type="file" id="myfile" name="myfile">
    <input type="image" src="w3 school.png" alt="Submit" width="48" height="48">
    </form>

    <hr>
    <form>
    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" name="quantity" min="0" max="100" step="10" value="30"><br>
    <label for="phone">Enter your phone number:</label>
    <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" placeholder="123-45-678" autofocus><br>
    <label for="homepage">Add your homepage:</label>
    <input type="url" id="homepage" name="homepage">
    <input type="submit" value="Submit">
    </form>

    
    
</body>
</html>
